# fly.toml app configuration file generated for yoink-backend on 2026-03-28T17:58:07+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yoink-backend'
primary_region = 'bom'

[build]
  [build.args]
    GO_VERSION = '1.25.1'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # 1 warm machine avoids a cold-start on the first request of a traffic spike
  # (e.g. a shared link suddenly getting a lot of hits). Bump this further, or
  # add [http_service.concurrency] limits, if a single repo's traffic outgrows
  # one machine. Costs a small amount to keep running vs. scale-to-zero.
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
